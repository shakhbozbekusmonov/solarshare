services:
  postgres:
    image: postgres:16-alpine
    container_name: solarshare-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: solarshare
      POSTGRES_PASSWORD: solarshare_secret
      POSTGRES_DB: solarshare
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
